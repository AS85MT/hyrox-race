name: Race sync
on:
  push:
    branches: [main]
  schedule:
    # 14:00 and 23:00 Europe/Rome (CEST = UTC+2). Adjust to 13:00/22:00 UTC after DST ends in late Oct — race is over by then anyway.
    - cron: '0 12 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch: {}

concurrency:
  group: race-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node --test
      - run: node sync/sync.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
